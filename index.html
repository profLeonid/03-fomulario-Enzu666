<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/e0e28af2d6.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Formulário</title>
</head>
<body class="w-100% h-100% bg-[#FF3131] flex flex-col h-screen items-center justify-center gap-4">
    <header class="flex flex-col gap-3 items-center">
        <h1 class="flex items-center justify-center text-white text-5xl">Criar Conta</h1>
        <div class="w-[168px] h-[40px] flex gap-4 justify-between">
            <div class="w-10 h-10 flex items-center justify-center bg-white rounded-[50px] fa-brands fa-facebook-f"></div>
            <div class="w-10 h-10 flex items-center justify-center bg-white rounded-[50px] fa-brands fa-google hover:bg-[#FF3131] hover:shadow-[0px_5px_10px_black] hover:text-white"></div>
            <div class="w-10 h-10 flex items-center justify-center bg-white rounded-[50px] fa-brands fa-linkedin-in"></div>
        </div>
        <p class="text-white text-[14px]">ou cadastre seu email</p>
    </header>

    <main class="w-[100vw] flex flex-col items-center justify-center gap-3">
        <div class="flex flex-col gap-3">
            <div class="w-[290px] h-8 pl-4 bg-white flex items-center text-[#A0A0A0]">nome</div>
            <div class="w-[290px] h-8 pl-4 bg-white flex items-center text-[#A0A0A0]">email</div>
            <div class="w-[290px] h-8 pl-4 bg-white flex items-center text-[#A0A0A0]">senha</div>
        </div>
        <button class="w-[180px] h-[40px] text-white border-[2px] border-white rounded-[20px] ">cadastrar</button>
    </main>

    <footer class="flex gap-2">
        <p class="text-white text-[16px]">Já tem conta?</p>
        <p class="text-white font-bold text-[16px]">login</p>
    </footer>
</body>
</html>
